databases:
  - name: ascapital-db
    databaseName: ascapital
    user: ascapital
    plan: free
    region: oregon

services:
  - type: web
    name: ascapital-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ascapital.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: ascapital-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ascapital-api.onrender.com,ascapitalrealestate.com,www.ascapitalrealestate.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ascapital-frontend.onrender.com,https://ascapitalrealestate.com,https://www.ascapitalrealestate.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://ascapitalrealestate.com,https://www.ascapitalrealestate.com,https://ascapital-api.onrender.com
      # Cloudinary credentials — set these in the Render dashboard, not in YAML
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: ascapital-frontend
    runtime: static
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Frontend calls the backend directly (CORS handles it).
      # Render's free static-site rewrites can proxy to external URLs for
      # exact paths (see /sitemap.xml below) but NOT for wildcards with
      # :splat — those silently 404. So /admin and /api stay on the
      # backend's own URL until we put it on a custom subdomain.
      - key: VITE_API_URL
        value: https://ascapital-api.onrender.com/api
    routes:
      # Sitemap is generated dynamically by Django so new properties appear
      # without a frontend rebuild. Exact-path proxy — works.
      - type: rewrite
        source: /sitemap.xml
        destination: https://ascapital-api.onrender.com/sitemap.xml
      # SPA fallback — every non-asset URL serves index.html so the
      # client-side router can render the right page.
      - type: rewrite
        source: /*
        destination: /index.html
