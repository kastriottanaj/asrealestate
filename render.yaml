databases:
  - name: ascapital-db
    databaseName: ascapital
    user: ascapital
    plan: free
    region: oregon

services:
  - type: web
    name: ascapital-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ascapital.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: ascapital-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ascapital-api.onrender.com,ascapitalrealestate.com,www.ascapitalrealestate.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ascapital-frontend.onrender.com,https://ascapitalrealestate.com,https://www.ascapitalrealestate.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://ascapitalrealestate.com,https://www.ascapitalrealestate.com,https://ascapital-api.onrender.com
      # Cloudinary credentials — set these in the Render dashboard, not in YAML
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: ascapital-frontend
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node server.js
    autoDeploy: true
    envVars:
      # Same-origin: requests hit /api on ascapitalrealestate.com, server.js
      # proxies them (and /admin, /static) to the Django backend.
      - key: VITE_API_URL
        value: /api
      - key: BACKEND_URL
        value: https://ascapital-api.onrender.com
