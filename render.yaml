databases:
  - name: ascapital-db
    databaseName: ascapital
    user: ascapital
    plan: free
    region: oregon

services:
  - type: web
    name: ascapital-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ascapital.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: ascapital-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ascapital-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ascapital-frontend.onrender.com

  - type: web
    name: ascapital-frontend
    runtime: static
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://ascapital-api.onrender.com/api
    routes:
      # Map clean URLs to their prerendered nested index.html
      # (Render's rewrites run BEFORE static file matching, so without
      # these rules every /path without trailing slash falls through to
      # the SPA fallback below and serves the home page.)
      # Albanian (default, no prefix)
      - type: rewrite
        source: /prona
        destination: /prona/index.html
      - type: rewrite
        source: /sherbimet
        destination: /sherbimet/index.html
      - type: rewrite
        source: /rreth-nesh
        destination: /rreth-nesh/index.html
      - type: rewrite
        source: /kontakti
        destination: /kontakti/index.html
      - type: rewrite
        source: /ofroni-pronen
        destination: /ofroni-pronen/index.html
      # English
      - type: rewrite
        source: /en
        destination: /en/index.html
      - type: rewrite
        source: /en/prona
        destination: /en/prona/index.html
      - type: rewrite
        source: /en/sherbimet
        destination: /en/sherbimet/index.html
      - type: rewrite
        source: /en/rreth-nesh
        destination: /en/rreth-nesh/index.html
      - type: rewrite
        source: /en/kontakti
        destination: /en/kontakti/index.html
      - type: rewrite
        source: /en/ofroni-pronen
        destination: /en/ofroni-pronen/index.html
      # German
      - type: rewrite
        source: /de
        destination: /de/index.html
      - type: rewrite
        source: /de/prona
        destination: /de/prona/index.html
      - type: rewrite
        source: /de/sherbimet
        destination: /de/sherbimet/index.html
      - type: rewrite
        source: /de/rreth-nesh
        destination: /de/rreth-nesh/index.html
      - type: rewrite
        source: /de/kontakti
        destination: /de/kontakti/index.html
      - type: rewrite
        source: /de/ofroni-pronen
        destination: /de/ofroni-pronen/index.html
      # SPA fallback for any other unmatched URL
      - type: rewrite
        source: /*
        destination: /index.html
