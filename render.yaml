databases:
  - name: ascapital-db
    databaseName: ascapital
    user: ascapital
    plan: free
    region: oregon

services:
  - type: web
    name: ascapital-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ascapital.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: ascapital-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ascapital-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ascapital-frontend.onrender.com

  - type: web
    name: ascapital-frontend
    runtime: static
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://ascapital-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
