databases:
  - name: ascapital-db
    databaseName: ascapital
    user: ascapital
    plan: free
    region: oregon

services:
  - type: web
    name: ascapital-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ascapital.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: ascapital-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ascapital-api.onrender.com,ascapitalrealestate.com,www.ascapitalrealestate.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ascapital-frontend.onrender.com,https://ascapitalrealestate.com,https://www.ascapitalrealestate.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://ascapitalrealestate.com,https://www.ascapitalrealestate.com,https://ascapital-api.onrender.com
      # Cloudinary credentials — set these in the Render dashboard, not in YAML
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: ascapital-frontend
    runtime: static
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Same-origin: requests go to /api on ascapitalrealestate.com,
      # which the routes below proxy to the ascapital-api service.
      - key: VITE_API_URL
        value: /api
    routes:
      # Proxy backend paths to the Django service so the admin and API
      # live on the public domain (ascapitalrealestate.com/admin, /api/...).
      # /static/* covers Django admin's CSS/JS (Vite emits to /assets/*, no clash).
      - type: rewrite
        source: /admin/*
        destination: https://ascapital-api.onrender.com/admin/:splat
      - type: rewrite
        source: /api/*
        destination: https://ascapital-api.onrender.com/api/:splat
      - type: rewrite
        source: /static/*
        destination: https://ascapital-api.onrender.com/static/:splat
      # SPA fallback — every non-asset URL serves index.html so the
      # client-side router can render the right page.
      - type: rewrite
        source: /*
        destination: /index.html
